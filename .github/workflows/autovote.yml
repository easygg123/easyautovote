name: Autovote Karuta

  on:
    schedule:
      - cron: '0 */12 * * *'
    workflow_dispatch:

  jobs:
    vote:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install dependencies
          run: npm install

        - name: Install Chromium dependencies
          run: |
            sudo apt-get update
            sudo apt-get install -y \
              xvfb \
              libgconf-2-4 \
              libatk1.0-0 \
              libatk-bridge2.0-0 \
              libgdk-pixbuf2.0-0 \
              libgtk-3-0 \
              libnss3 \
              libxss1 \
              libasound2t64

        - name: Run autovote
          env:
            TOKEN: ${{ secrets.TOKEN }}
            BOT_ID: ${{ secrets.BOT_ID }}
          run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node index.js
  